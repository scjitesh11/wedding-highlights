
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Highlights</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hero">

    <div class="overlay">

        <div class="glass">

            <h3 id="title"></h3>

            <h1 id="coupleName"></h1>

            <p id="date"></p>

            <button id="watchBtn">
                ❤️ Watch Our Story
            </button>

        </div>

    </div>

</div>
<section id="story" class="story">

    <h2>❤️ Our Story ❤️</h2>

    <p>
        Every love story is beautiful,
        but ours is our favorite.
    </p>

    <img src="image/photo1.jpg" alt="Our Story">

</section>

<audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mpeg">
</audio>


<script src="config.js"></script>
<script src="script.js"></script>

</body>

</html>
